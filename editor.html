<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTS Game Editor</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #08090d;
        --panel: #11131b;
        --panel-2: #171a24;
        --line: #2d3346;
        --blue: #2c5bf0;
        --gold: #ffd700;
        --text: #f4f7ff;
        --muted: #9ca7c2;
        --danger: #ff4d67;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(44, 91, 240, 0.18), transparent 34%),
          radial-gradient(circle at 82% 12%, rgba(255, 215, 0, 0.1), transparent 28%),
          var(--bg);
        color: var(--text);
        font-family: Inter, "Segoe UI", Arial, sans-serif;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      .app {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        min-height: 100vh;
      }

      .sidebar {
        border-right: 1px solid var(--line);
        background: rgba(8, 9, 13, 0.92);
        padding: 20px;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow: auto;
      }

      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 18px;
      }

      .brand h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0;
      }

      .status {
        margin: 12px 0 18px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.4;
      }

      .project-list {
        display: grid;
        gap: 8px;
      }

      .project-item {
        width: 100%;
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr);
        gap: 10px;
        align-items: center;
        padding: 10px;
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        text-align: left;
      }

      .project-item.active {
        border-color: var(--gold);
        box-shadow: inset 4px 0 0 var(--gold);
      }

      .thumb {
        width: 44px;
        aspect-ratio: 1;
        object-fit: cover;
        background: #05060a;
        border: 1px solid var(--line);
      }

      .project-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 800;
      }

      .project-id {
        color: var(--muted);
        font-size: 12px;
        margin-top: 3px;
      }

      .main {
        padding: 24px;
        overflow: auto;
      }

      .toolbar,
      .section,
      .step,
      .tab-editor {
        border: 1px solid var(--line);
        background: rgba(17, 19, 27, 0.88);
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px;
        margin-bottom: 18px;
      }

      .toolbar-actions,
      .row-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .button {
        min-height: 38px;
        padding: 9px 13px;
        border: 1px solid var(--line);
        background: var(--panel-2);
        color: var(--text);
        font-weight: 800;
      }

      .button.primary {
        background: var(--blue);
        border-color: #8ea6ff;
      }

      .button.gold {
        background: var(--gold);
        color: #08090d;
        border-color: #fff4a0;
      }

      .button.danger {
        background: transparent;
        color: var(--danger);
        border-color: rgba(255, 77, 103, 0.45);
      }

      .button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .section {
        padding: 18px;
        margin-bottom: 18px;
      }

      .section h2 {
        margin: 0 0 14px;
        font-size: 18px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .field.full {
        grid-column: 1 / -1;
      }

      label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        background: #090b12;
        color: var(--text);
        padding: 10px 11px;
        outline: none;
      }

      textarea {
        min-height: 110px;
        resize: vertical;
        line-height: 1.45;
      }

      input:focus,
      textarea:focus {
        border-color: var(--blue);
      }

      .asset-row {
        display: grid;
        grid-template-columns: 104px minmax(0, 1fr);
        gap: 12px;
        align-items: start;
      }

      .preview {
        width: 104px;
        aspect-ratio: 1;
        object-fit: cover;
        border: 1px solid var(--line);
        background: #05060a;
      }

      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
      }

      .tab-button {
        min-height: 38px;
        padding: 8px 12px;
        border: 1px solid var(--line);
        background: #090b12;
        color: var(--text);
        font-weight: 800;
      }

      .tab-button.active {
        background: var(--gold);
        color: #08090d;
        border-color: #fff4a0;
      }

      .tab-editor,
      .step {
        padding: 14px;
        margin-top: 12px;
      }

      .steps {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      .empty {
        border: 1px dashed var(--line);
        padding: 30px;
        color: var(--muted);
        text-align: center;
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .hidden-file {
        display: none;
      }

      @media (max-width: 960px) {
        .app {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
          height: auto;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script type="module" crossorigin src="/assets/editor-DRVgoKkZ.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <h1>OTS Editor</h1>
          <button class="button gold" id="addProjectButton">Добавить</button>
        </div>
        <button class="button primary" id="openFolderButton">Открыть папку проекта</button>
        <div class="status" id="statusBox"></div>
        <div class="project-list" id="projectList"></div>
      </aside>

      <main class="main">
        <div class="toolbar">
          <div>
            <strong id="editorTitle">Редактор карточек</strong>
            <div class="hint">Сохраняет карточки, изображения и инструкции в структуру основного сайта.</div>
          </div>
          <div class="toolbar-actions">
            <a class="button" href="/">Открыть сайт</a>
            <button class="button" id="duplicateProjectButton">Дублировать</button>
            <button class="button danger" id="deleteProjectButton">Удалить</button>
            <button class="button" id="downloadJsonButton">Скачать JSON</button>
            <button class="button primary" id="saveButton">Сохранить</button>
          </div>
        </div>

        <div id="editorRoot"></div>
      </main>
    </div>

  </body>
</html>
